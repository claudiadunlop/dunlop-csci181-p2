<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 2 Modals</title>
    <link rel="stylesheet" href="style.css">
    <script src="modal.js" defer></script>
</head>
<body>
    <dialog id="project-modal" tabindex="-1">
        <button id="modal-close">X</button>
        <h2 id="modal-title"></h2>
        <p id="modal-details"></p>
        <a id="modal-link" href="#" target="_blank"></a>
    </dialog>
<main>
    <h2 class="project-header">Projects</h2>
    <section class="projects">
        <ul class="project-list">
            <li class="cards">
                <h3>Rubik's Cube</h3>
                <img src="images/rubiks-cube.jpg" alt="Rubik's Cube" class="rubiks-cube">
                <article>
                    <button type="button" class="project-card" data-index="0">
                    Learn More
                    </button>
                </article>
            </li>
            <li class="cards">
                <h3>Go Board</h3>
                <img src="images/go-board.avif" alt="Go Board" class="go-board">
                <article>
                    <button type="button" class="project-card" data-index="1">
                    Learn More
                    </button>
                </article>
            </li>
            <li class="cards">
                <h3>Blackjack Game</h3>
                <img src="images/blackjack.png" alt="Blackjack Game" class="blackjack-game">
                <article>
                    <button type="button" class="project-card" data-index="2">
                    Learn More
                    </button>
                </article>
            </li>
            <li class="cards">
                <h3>Chess Game</h3>
                <img src="images/chessboard.jpg" alt="Chess Game" class="chess">
                <article>
                    <button type="button" class="project-card" data-index="3">
                    Learn More
                    </button>
                </article>
            </li>
            <li class="cards">
                <h3>Photo Filter</h3>
                <img src="images/photo-filter.jpg" alt="Photo Filter" class="photo-filter">
                <article>
                    <button type="button" class="project-card" data-index="4">
                    Learn More
                    </button>
                </article>
            </li>
            <li class="cards">
                <h3>Weather App</h3>
                <img src="images/weather-app.webp" alt="Weather App" class="weather-app">
                <article>
                    <button type="button" class="project-card" data-index="5">
                    Learn More
                    </button>
                </article>
            </li>
        </ul>
    </section>
</main>
</body>
</html>
